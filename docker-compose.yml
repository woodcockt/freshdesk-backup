services:
  postgres:
    image: postgres:16
    container_name: freshdesk-archive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freshdesk_archive}
      POSTGRES_USER: ${POSTGRES_USER:-freshdesk_archive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freshdesk_archive}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - freshdesk_archive_pgdata:/var/lib/postgresql/data

volumes:
  freshdesk_archive_pgdata:
